[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "alembic upgrade head && python -c 'from app.main import app; print(\"App import OK\")' && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --log-level info"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
