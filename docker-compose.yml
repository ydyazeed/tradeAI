services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://tradeai:tradeai_dev@db:5432/tradeai
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app

  db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: tradeai
      POSTGRES_USER: tradeai
      POSTGRES_PASSWORD: tradeai_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradeai -d tradeai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
